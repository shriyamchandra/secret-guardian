# Render Blueprint for Secret Guardian Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: secret-guardian-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GOOGLE_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
    healthCheckPath: /health
    autoDeploy: true
